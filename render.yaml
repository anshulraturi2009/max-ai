services:
  - type: web
    name: max-ai-backend
    runtime: python
    rootDir: MAX-AI/backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY_PRIMARY
        sync: false
      - key: GEMINI_API_KEY_SECONDARY
        sync: false
      - key: GEMINI_API_KEYS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_KEY_PRIMARY
        sync: false
      - key: GROQ_API_KEY_SECONDARY
        sync: false
      - key: GROQ_API_KEYS
        sync: false
      - key: GEMINI_VIDEO_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY_PRIMARY
        sync: false
      - key: ELEVENLABS_API_KEY_SECONDARY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: ELEVENLABS_VOICE_ID_PRIMARY
        sync: false
      - key: ELEVENLABS_VOICE_ID_SECONDARY
        sync: false
      - key: ELEVENLABS_MODEL_ID
        value: eleven_multilingual_v2
      - key: ELEVENLABS_OUTPUT_FORMAT
        value: mp3_44100_128
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: VEO_MODEL
        value: veo-3.1-lite-generate-preview
      - key: VEO_RESOLUTION
        value: 720p
      - key: VEO_ASPECT_RATIO
        value: 16:9
      - key: VEO_DURATION_SECONDS
        value: "8"
      - key: ALLOWED_ORIGINS
        value: https://max-ai-a030a.web.app,https://max-ai-a030a.firebaseapp.com,https://anshulraturi.me,https://www.anshulraturi.me
